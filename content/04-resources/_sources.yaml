# Top-level SOURCES — archives, libraries, publishers, podcast shows, and
# channels worth exploring on their own, as opposed to the specific items
# (single texts, episodes, films) that live in theme lens files.
#
# This is a curated "where to go dig" list. It is hand-maintained here (not
# inferred from theme files), because sources span every theme. The generator
# renders it into sources.md. The filename starts with "_" so Quartz does not
# publish this raw file as a page.
#
# Fields:
#   name:   required. The source's name.
#   type:   archive | library | study-guide | course | publisher | podcast | channel | project | network
#   url:    required. Where to explore it.
#   access: free | borrow | paywalled | print   (optional; defaults to blank)
#   note:   one line on what you'll find there.

sources:
  # --- Archives & libraries ---
  - name: "Marxists Internet Archive"
    type: archive
    url: "https://www.marxists.org"
    access: free
    note: "The largest free archive of Marxist writing; most theory readings link here. Has study guides and a glossary."
  - name: "The Anarchist Library"
    type: library
    url: "https://theanarchistlibrary.org"
    access: free
    note: "A vast free library of anarchist texts, from classics to contemporary pamphlets."
  - name: "libcom.org library"
    type: library
    url: "https://libcom.org/library"
    access: free
    note: "Free library of libertarian-communist and working-class history, theory, and organizing texts."
  - name: "Socialist Stories"
    type: library
    url: "http://www.socialiststories.com/"
    access: free
    note: "A multilingual library of socialist texts in English, Arabic, and Italian, built by and for comrades doing their own revolutionary education. Worth digging through for material the English-language archives do not carry."
  - name: "Internet Archive"
    type: archive
    url: "https://archive.org"
    access: borrow
    note: "Millions of books to borrow free (one-hour renewable loans), plus films, audio, and web history."
  - name: "Library of Congress Digital Collections"
    type: archive
    url: "https://www.loc.gov/collections/"
    access: free
    note: "Public-domain primary sources, including the WPA slave narratives and extensive labor history."
  - name: "Studs Terkel Radio Archive (WFMT)"
    type: archive
    url: "https://studsterkel.wfmt.com/"
    access: free
    note: "2,000+ streamable interviews on work, class, and ordinary life — a cornerstone oral-history archive."
  - name: "Kheel Center for Labor-Management Documentation (Cornell ILR)"
    type: archive
    url: "https://digitalcommons.ilr.cornell.edu/kheel/"
    access: free
    note: "Labor oral histories, campaign records, and the Triangle Shirtwaist Fire collection."

  # --- Publishers & imprints ---
  - name: "Monthly Review Press"
    type: publisher
    url: "https://monthlyreview.org"
    access: paywalled
    note: "Long-running socialist magazine and book publisher; the magazine archive has decades of essays."
  - name: "Haymarket Books"
    type: publisher
    url: "https://www.haymarketbooks.org"
    access: paywalled
    note: "Radical publisher with frequent free e-book giveaways and an active events series."
  - name: "Verso Books"
    type: publisher
    url: "https://www.versobooks.com"
    access: paywalled
    note: "The largest independent radical publisher; regular blog essays and discounted e-books."
  - name: "Pluto Press"
    type: publisher
    url: "https://www.plutobooks.com"
    access: paywalled
    note: "Left academic and movement publisher; source of many widely assigned study-group texts."

  # --- Podcasts & audio ---
  - name: "Making Gay History"
    type: podcast
    url: "https://makinggayhistory.org/"
    access: free
    note: "Eric Marcus's archive of the interviews he recorded himself from the late 1980s on, so queer elders speak in their own voices rather than being summarized. Every episode is free with a full transcript, which makes them assignable as readings. Deep on Rivera, Johnson, and the people the movement's official history left out."
  - name: "Upstream"
    type: podcast
    url: "https://www.upstreampodcast.org/"
    access: free
    note: "Documentary-style audio on post-capitalist economics, cooperatives, and just transition."
  - name: "Working People"
    type: podcast
    url: "https://inthesetimes.com/podcasts/working-people"
    access: free
    note: "First-person interviews with rank-and-file workers about their jobs and organizing."
  - name: "Economic Update (Democracy at Work)"
    type: podcast
    url: "https://www.democracyatwork.info/economicupdate"
    access: free
    note: "Richard Wolff's weekly show connecting wages, debt, and profit to how capitalism is structured."
  - name: "The Dig"
    type: podcast
    url: "https://thedigradio.com/"
    access: free
    note: "Long-form Jacobin interviews on political economy, history, and movements."

  # --- Video channels ---
  - name: "The Gravel Institute"
    type: channel
    url: "https://www.youtube.com/@GravelInstitute"
    access: free
    note: "Short, shareable left explainers built as a counter to right-wing edutainment."
  - name: "Second Thought"
    type: channel
    url: "https://www.youtube.com/@SecondThought"
    access: free
    note: "Accessible socialist explainers on class, wealth, and alternatives to capitalism."
  - name: "Andrewism"
    type: channel
    url: "https://www.youtube.com/@Andrewism"
    access: free
    note: "Solarpunk-anarchist video essays on ecology, the commons, and building alternatives."

  # --- Projects & networks ---
  - name: "Zinn Education Project"
    type: project
    url: "https://www.zinnedproject.org"
    access: free
    note: "Free people's-history teaching materials, primary-source readings, and dramatic readings."
  - name: "Labor Notes"
    type: network
    url: "https://labornotes.org"
    access: free
    note: "Rank-and-file organizing network; free handbooks, handouts, and a trainer's guide."
  - name: "Autonomous Tenants Union Network"
    type: network
    url: "https://atun-rsia.org"
    access: free
    note: "Tenant-union organizing guides and toolkits, in English and Spanish."

