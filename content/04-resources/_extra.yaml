# Central resource list — for resources NOT filed under a specific theme + lens.
#
# Most resources should live in the frontmatter of a theme lens file
# (content/themes/<theme>/<lens>.md), because that gives them an automatic
# "Used in" link and keeps them next to the curated write-up. Use THIS file
# only for resources that don't belong to one lens yet — cross-cutting works,
# an inbox of things to file later, etc.
#
# Entries use the same fields as lens frontmatter, plus an optional `used_in:`
# (plain text or a [[wikilink]]) since the location can't be inferred here.
# The filename starts with "_" so Quartz does not publish it as a page.
#
# Uncomment and copy this template to add one:
#
# resources:
#   - title: "Example Work"
#     authors: ["Author Name"]
#     year: 2020
#     format: reading          # reading | primary-source | film | video | podcast
#     kind: book
#     access: free             # free | borrow | paywalled | print
#     url: "https://example.org"
#     note: "One-line description for the tables."
#     used_in: "Not yet filed"   # optional: shows in the 'Used in' column

resources:
