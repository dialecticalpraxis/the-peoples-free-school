name: Regenerate resource indexes

# When resources change in a theme lens file (or the central _extra.yaml, or the
# generator script), rebuild the index tables under content/04-resources/ and commit
# them back, so the files you browse on GitHub always match the source.
#
# The published site and the vault zip regenerate on their own during their
# builds, so this workflow is only about keeping the checked-in tables in sync.
# It commits with the default GITHUB_TOKEN, which deliberately does not retrigger
# other workflows — that is why it cannot cause a loop.

on:
  push:
    branches: [main]
    paths:
      - "content/03-themes/**"
      - "content/04-resources/_extra.yaml"
      - "scripts/build-resource-indexes.mjs"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "regenerate-resources"
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Regenerate index tables
        run: npm run generate
      - name: Commit changes if any
        run: |
          git config user.name "dialecticalpraxis"
          git config user.email "github.lesser968@passmail.net"
          if [ -n "$(git status --porcelain content/04-resources content/school-index.md)" ]; then
            git add content/04-resources/*.md content/school-index.md
            git commit -m "Regenerate resource and school index tables [automated]"
            git push
          else
            echo "Index tables already up to date."
          fi
